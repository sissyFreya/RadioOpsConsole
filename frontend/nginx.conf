server {
  listen 80;
  server_name _;

  # Allow audio file uploads up to 500 MB (matches backend _TRACK_MAX_BYTES)
  client_max_body_size 500m;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy WebSocket connections (log tail, etc.)
  location /ws/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 3600s;
  }

  # Proxy all API routes to backend (avoids CORS cross-origin requests)
  location ~ ^/(auth|nodes|radios|actions|audit|users|podcasts|live|health|media|metrics)(/|$) {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback for everything else
  location / {
    try_files $uri $uri/ /index.html;
  }
}
